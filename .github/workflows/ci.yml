name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - run: composer install --no-progress --prefer-dist
      - run: find src/ -name "*.php" -exec php -l {} \; 2>&1 | tee lint.txt; if grep -v "No syntax errors" lint.txt | grep -q .; then echo "Syntax errors found:"; grep -v "No syntax errors" lint.txt; exit 1; fi

  test:
    name: PHPUnit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, mbstring
          tools: composer:v2
          coverage: xdebug
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run tests
        run: vendor/bin/phpunit --coverage-text
      - name: Upload coverage
        if: matrix.php == '8.4'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt

  phpstan:
    name: PHPStan Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2, phpstan
      - run: composer install --no-progress --prefer-dist
      - run: phpstan analyse --memory-limit=512M

  cs-fixer:
    name: Code Style (PHP-CS-Fixer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2, cs2pr
      - run: composer install --no-progress --prefer-dist
      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --format=txt 2>&1 | tee cs-report.txt || true
      - name: Show violations
        if: failure()
        run: cat cs-report.txt

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
      - run: composer install --no-progress --prefer-dist
      - name: Audit dependencies
        run: composer audit --format=json 2>&1 | tee audit-report.json || true
      - name: Show vulnerabilities
        run: |
          if grep -q '"total"' audit-report.json; then
            echo "=== Security Audit Report ==="
            cat audit-report.json | php -r 'echo json_encode(json_decode(file_get_contents("php://stdin")), JSON_PRETTY_PRINT);'
          fi

  cache:
    name: Cache Clear Test
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
      - run: composer install --no-progress --prefer-dist
      - name: Test cache:clear command
        run: php phoenix cache:clear
